--dataset_directory: ./data
--result_directory: ./results
--export_dir: baseline

--use_cuda: True
--log_interval: 100
--model: DCASE2023T2-AE
--score: MSE
--seed: 13711
--is_auto_download: False

--max_fpr: 0.1
--decision_threshold: 0.9

# feature
--n_mels: 128
--frames: 5
--frame_hop_length: 1
--n_fft: 1024
--hop_length: 512
--power: 2.0
--fmin: 0.0
--fmax: null
--win_length: null

# fit
--batch_size: 256
--epochs: 100
-lr: 0.001
--shuffle: True
--validation_split: 0.1

# AutoTrash-specific CNN DAE + KL defaults.
# Used only when --model is set to autotrash_cnn_dae_kl.
--autotrash_epochs: 30
--autotrash_batch_size: 512
--autotrash_frames: 32
--autotrash_latent_dim: 32
--autotrash_skip_scale: 0.5
--autotrash_use_denoising: True
--autotrash_use_augmentation: True
--autotrash_use_balanced_recon: True
--autotrash_use_kl: False
--autotrash_kl_start_epoch: 6
--autotrash_kl_max_weight: 0.001
--autotrash_cache_directory: ""
--autotrash_rebuild_cache: False
--autotrash_aug_gaussian_std: 0.03
--autotrash_aug_gain_min: 0.8
--autotrash_aug_gain_max: 1.2
--autotrash_aug_time_mask_width: 2
--autotrash_aug_time_mask_prob: 0.5
--autotrash_aug_freq_mask_width: 8
--autotrash_aug_freq_mask_prob: 0.5
--autotrash_use_supplemental_clean: False
--autotrash_supplemental_clean_glob: "*machine*.wav"
--autotrash_supplemental_domain: source
--autotrash_use_supplemental_noise: False
--autotrash_supplemental_noise_glob: "*noise*.wav"
--autotrash_noise_mix_prob: 0.3
--autotrash_noise_snr_min: 10.0
--autotrash_noise_snr_max: 20.0
--autotrash_grad_clip: 5.0
--autotrash_show_progress: True
--autotrash_eta_update_interval: 10
